name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 21
          distribution: zulu
          cache: maven

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: "projects/848539402404/locations/global/workloadIdentityPools/gh-actions/providers/gh-actions"
          service_account: "gh-actions-dapla-pseudo@artifact-registry-5n.iam.gserviceaccount.com"
          token_format: access_token

      - name: Build with Maven
        run: mvn --batch-mode -P ssb-gar package

      - name: Fail build on High/Critical Vulnerabilities
        uses: aquasecurity/trivy-action@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          scan-type: 'fs'
          format: 'table'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: 1

      - name: Run Trivy vulnerability scanner (SARIF for reporting)
        uses: aquasecurity/trivy-action@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          skip-setup-trivy: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Build and test with Maven
        if: github.event_name == 'pull_request'
        run: |
          mvn --batch-mode -P ssb-gar clean test

      - name: Build with Maven and deploy to Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && success()
        run: |
          mkdir -p ~/.m2
          cp .github/maven/settings.xml ~/.m2/settings.xml
          mvn -B -P ssb-gar deploy -Dmaven.javadoc.skip=true \
              -Dartifact.registry.token="${{ steps.auth.outputs.access_token }}" \
              -Dartifact-registry.url="https://europe-north1-maven.pkg.dev/artifact-registry-5n/dapla-pseudo-maven"
